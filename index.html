<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chiwoogood</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrap {
            width: 90%;
            max-width: 720px;
            padding: 48px;
            border-radius: 28px;
            background: white;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #eef2ff;
            color: #4338ca;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 42px;
            color: #111827;
        }

        p {
            margin-top: 16px;
            font-size: 18px;
            line-height: 1.6;
            color: #4b5563;
        }

        a {
            display: inline-block;
            margin-top: 28px;
            padding: 14px 22px;
            border-radius: 14px;
            background: #111827;
            color: white;
            text-decoration: none;
            font-weight: 700;
        }

        a:hover {
            background: #374151;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="badge">GitHub Pages</div>
        <h1>정적 페이지 테스트 성공</h1>
        <p>
            이 페이지는 GitHub Pages에서 호스팅되는 정적 웹페이지입니다.<br>
            HTML, CSS, JavaScript만으로 구성할 수 있습니다.
        </p>
        <a href="https://github.com/chiwoogood/chiwoogood.github.io">
            GitHub Repository
        </a>
    </div>
</body>
</html>
